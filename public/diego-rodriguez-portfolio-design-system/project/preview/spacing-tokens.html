<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:20px 24px; }
.row { display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; }
.item { display:flex; flex-direction:column; align-items:center; gap:8px; }
.box { background:#003c73; opacity:0.15; }
.name { font-size:9px; font-weight:700; color:#424751; letter-spacing:0.08em; text-transform:uppercase; }
.val  { font-size:9px; color:#727782; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#424751; margin-bottom:12px; }
.divider { width:100%; height:1px; background:#e2e2ea; margin:14px 0; }
.radius-row { display:flex; gap:16px; align-items:center; }
.rbox { width:56px; height:40px; background:#003c73; opacity:0.18; }
</style></head>
<body>
<div class="label">Spacing Scale</div>
<div class="row">
  <div class="item"><div class="box" style="width:4px;height:16px"></div><div class="name">1</div><div class="val">4px</div></div>
  <div class="item"><div class="box" style="width:8px;height:24px"></div><div class="name">2</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="width:12px;height:32px"></div><div class="name">3</div><div class="val">12px</div></div>
  <div class="item"><div class="box" style="width:16px;height:40px"></div><div class="name">4</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="width:24px;height:48px"></div><div class="name">6</div><div class="val">24px</div></div>
  <div class="item"><div class="box" style="width:32px;height:56px"></div><div class="name">8</div><div class="val">32px</div></div>
  <div class="item"><div class="box" style="width:40px;height:64px"></div><div class="name">10</div><div class="val">40px</div></div>
  <div class="item"><div class="box" style="width:48px;height:72px"></div><div class="name">12</div><div class="val">48px</div></div>
</div>
<div class="divider"></div>
<div class="label">Border Radius</div>
<div class="radius-row">
  <div class="item"><div class="rbox" style="border-radius:2px"></div><div class="name">xs</div><div class="val">2px</div></div>
  <div class="item"><div class="rbox" style="border-radius:4px"></div><div class="name">sm</div><div class="val">4px</div></div>
  <div class="item"><div class="rbox" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px</div></div>
  <div class="item"><div class="rbox" style="border-radius:12px"></div><div class="name">lg</div><div class="val">12px</div></div>
  <div class="item"><div class="rbox" style="border-radius:9999px"></div><div class="name">full</div><div class="val">pill</div></div>
</div>
</body></html>
