<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:20px; }
.row { display:flex; gap:8px; }
.swatch { flex:1; height:72px; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
.swatch span { font-size:9px; font-weight:600; letter-spacing:0.05em; }
.light { color:#191b21; }
.dark  { color:#fff; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#424751; margin-bottom:8px; }
</style></head>
<body>
<div class="label">Secondary — Teal &nbsp;·&nbsp; Tertiary — Rust</div>
<div class="row">
  <div class="swatch dark"  style="background:#002023"><span>#002023</span><span style="opacity:.6">Sec. Dark</span></div>
  <div class="swatch dark"  style="background:#006971"><span>#006971</span><span style="opacity:.6">Secondary</span></div>
  <div class="swatch dark"  style="background:#006f78"><span>#006f78</span><span style="opacity:.6">Sec. Cont.</span></div>
  <div class="swatch light" style="background:#7cd4de"><span>#7cd4de</span><span style="opacity:.6">Sec. Dim</span></div>
  <div class="swatch light" style="background:#98f1fa"><span>#98f1fa</span><span style="opacity:.6">Sec. Fixed</span></div>
  <div class="swatch dark"  style="background:#380d00"><span>#380d00</span><span style="opacity:.6">Ter. Dark</span></div>
  <div class="swatch dark"  style="background:#6f2100"><span>#6f2100</span><span style="opacity:.6">Tertiary</span></div>
  <div class="swatch dark"  style="background:#953102"><span>#953102</span><span style="opacity:.6">Ter. Cont.</span></div>
  <div class="swatch light" style="background:#ffb59b"><span>#ffb59b</span><span style="opacity:.6">Ter. Dim</span></div>
  <div class="swatch light" style="background:#ffdbcf"><span>#ffdbcf</span><span style="opacity:.6">Ter. Fixed</span></div>
</div>
</body></html>
