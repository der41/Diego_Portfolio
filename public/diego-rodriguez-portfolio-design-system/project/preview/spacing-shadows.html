<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ededf6; font-family:'Inter',sans-serif; padding:24px; display:flex; gap:20px; align-items:flex-start; }
.card { background:#faf8ff; border-radius:8px; padding:20px; width:160px; }
.meta { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#727782; margin-bottom:8px; }
</style></head>
<body>
  <div>
    <div class="meta">shadow-sm</div>
    <div class="card" style="box-shadow:0 1px 3px rgba(25,27,33,0.06),0 1px 2px rgba(25,27,33,0.04)">
      <div style="font-size:12px;color:#424751">Subtle lift — cards at rest</div>
    </div>
  </div>
  <div>
    <div class="meta">shadow-md (hover)</div>
    <div class="card" style="box-shadow:0 4px 12px rgba(25,27,33,0.08),0 2px 4px rgba(25,27,33,0.04)">
      <div style="font-size:12px;color:#424751">Elevated — hover state</div>
    </div>
  </div>
  <div>
    <div class="meta">shadow-lg</div>
    <div class="card" style="box-shadow:0 20px 40px rgba(25,27,33,0.1)">
      <div style="font-size:12px;color:#424751">Modal / profile photo</div>
    </div>
  </div>
  <div>
    <div class="meta">shadow-nav</div>
    <div class="card" style="box-shadow:0px 20px 40px rgba(25,27,33,0.04)">
      <div style="font-size:12px;color:#424751">Nav bar — barely visible</div>
    </div>
  </div>
</body></html>
