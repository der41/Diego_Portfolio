<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; padding:0; }
nav { background:#faf8ff; box-shadow:0px 20px 40px rgba(25,27,33,0.04); padding:18px 28px; display:flex; justify-content:space-between; align-items:center; }
.wordmark { font-family:'Noto Serif',Georgia,serif; font-weight:700; font-size:1.25rem; letter-spacing:-0.03em; color:#191b21; }
.links { display:flex; gap:32px; align-items:center; }
.link { font-family:'Noto Serif',Georgia,serif; font-size:1rem; letter-spacing:-0.01em; color:rgba(25,27,33,0.6); text-decoration:none; }
.link.active { color:#003c73; border-bottom:2px solid #003c73; padding-bottom:4px; }
.cta { background:#003c73; color:#fff; padding:8px 24px; font-size:0.8rem; font-weight:500; letter-spacing:0.04em; border-radius:8px; text-decoration:none; transition:background 0.3s; }
</style></head>
<body>
<nav>
  <div class="wordmark">Diego Rodriguez</div>
  <div class="links">
    <a class="link active" href="#">About</a>
    <a class="link" href="#">Education</a>
    <a class="link" href="#">Experience</a>
    <a class="link" href="#">Projects</a>
  </div>
  <a class="cta" href="#">Connect</a>
</nav>
</body></html>
