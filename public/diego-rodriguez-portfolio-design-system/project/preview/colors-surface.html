<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:20px; }
.row { display:flex; gap:8px; }
.swatch { flex:1; height:64px; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:7px; border:1px solid rgba(0,0,0,0.06); }
.swatch span { font-size:9px; font-weight:600; letter-spacing:0.05em; color:#191b21; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#424751; margin-bottom:8px; }
</style></head>
<body>
<div class="label">Surface Scale</div>
<div class="row">
  <div class="swatch" style="background:#ffffff"><span>#ffffff</span><span style="opacity:.5;font-size:8px">Lowest</span></div>
  <div class="swatch" style="background:#f3f3fc"><span>#f3f3fc</span><span style="opacity:.5;font-size:8px">Low</span></div>
  <div class="swatch" style="background:#faf8ff"><span>#faf8ff</span><span style="opacity:.5;font-size:8px">Surface / BG</span></div>
  <div class="swatch" style="background:#ededf6"><span>#ededf6</span><span style="opacity:.5;font-size:8px">Container</span></div>
  <div class="swatch" style="background:#e7e7f0"><span>#e7e7f0</span><span style="opacity:.5;font-size:8px">High</span></div>
  <div class="swatch" style="background:#e2e2ea"><span>#e2e2ea</span><span style="opacity:.5;font-size:8px">Highest</span></div>
  <div class="swatch" style="background:#d9d9e2"><span>#d9d9e2</span><span style="opacity:.5;font-size:8px">Dim</span></div>
  <div class="swatch" style="background:#2e3037"><span style="color:#fff">#2e3037</span><span style="opacity:.5;font-size:8px;color:#fff">Inverse</span></div>
</div>
</body></html>
