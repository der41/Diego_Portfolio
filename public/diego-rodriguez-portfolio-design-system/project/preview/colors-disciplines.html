<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:20px; }
.row { display:flex; gap:8px; }
.swatch { flex:1; border-radius:6px; overflow:hidden; }
.swatch-top { height:56px; }
.swatch-bot { padding:8px; }
.swatch-bot .name { font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#191b21; }
.swatch-bot .hex  { font-size:9px; color:#424751; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#424751; margin-bottom:8px; }
</style></head>
<body>
<div class="label">Discipline Colors</div>
<div class="row">
  <div class="swatch">
    <div class="swatch-top" style="background:#003c73"></div>
    <div class="swatch-bot"><div class="name">Economics</div><div class="hex">#003c73</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-top" style="background:#6f2100"></div>
    <div class="swatch-bot"><div class="name">Statistics</div><div class="hex">#6f2100</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-top" style="background:#953102"></div>
    <div class="swatch-bot"><div class="name">Engineering</div><div class="hex">#953102</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-top" style="background:#006971"></div>
    <div class="swatch-bot"><div class="name">Comp. Sci.</div><div class="hex">#006971</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-top" style="background:#2F8F98"></div>
    <div class="swatch-bot"><div class="name">Commun.</div><div class="hex">#2F8F98</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-top" style="background:#006f78"></div>
    <div class="swatch-bot"><div class="name">Arts</div><div class="hex">#006f78</div></div>
  </div>
</div>
</body></html>
