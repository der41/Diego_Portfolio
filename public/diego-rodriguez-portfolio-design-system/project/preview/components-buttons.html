<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:24px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.btn { display:inline-block; text-decoration:none; font-size:0.8rem; font-weight:500; letter-spacing:0.04em; border-radius:8px; cursor:pointer; border:none; }
.meta { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#727782; margin-bottom:8px; }
.group { display:flex; flex-direction:column; }
</style></head>
<body>
  <div class="group">
    <div class="meta">Primary CTA</div>
    <button class="btn" style="background:#003c73;color:#fff;padding:10px 28px">Connect</button>
  </div>
  <div class="group">
    <div class="meta">Primary Hover</div>
    <button class="btn" style="background:#00539c;color:#fff;padding:10px 28px">Connect</button>
  </div>
  <div class="group">
    <div class="meta">Outline</div>
    <button class="btn" style="background:transparent;color:#003c73;padding:9px 27px;border:1px solid #c2c6d3">Connect</button>
  </div>
  <div class="group">
    <div class="meta">Ghost</div>
    <button class="btn" style="background:#d5e3ff30;color:#003c73;padding:10px 28px">Connect</button>
  </div>
  <div class="group">
    <div class="meta">Disabled</div>
    <button class="btn" style="background:#e2e2ea;color:#727782;padding:10px 28px;cursor:not-allowed">Connect</button>
  </div>
  <div class="group">
    <div class="meta">Discipline pill</div>
    <span style="display:inline-block;background:#003c73;color:#fff;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;border-radius:9999px;padding:4px 12px">Economics</span>
  </div>
  <div class="group">
    <div class="meta">Tag chip</div>
    <span style="display:inline-block;background:transparent;color:#006971;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:2px 0">AI, NLP, CS</span>
  </div>
</body></html>
