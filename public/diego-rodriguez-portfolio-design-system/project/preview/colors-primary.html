<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf8ff; font-family:'Inter',sans-serif; padding:20px; }
.row { display:flex; gap:8px; }
.swatch { flex:1; height:72px; border-radius:6px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
.swatch span { font-size:9px; font-weight:600; letter-spacing:0.05em; }
.light { color:#191b21; }
.dark  { color:#fff; }
.label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#424751; margin-bottom:8px; }
</style></head>
<body>
<div class="label">Primary — Navy Blue</div>
<div class="row">
  <div class="swatch dark" style="background:#001c3b"><span>#001c3b</span><span style="opacity:.6">Fixed Dark</span></div>
  <div class="swatch dark" style="background:#003c73"><span>#003c73</span><span style="opacity:.6">Primary</span></div>
  <div class="swatch dark" style="background:#00539c"><span>#00539c</span><span style="opacity:.6">Container</span></div>
  <div class="swatch dark" style="background:#1c5fa8"><span>#1c5fa8</span><span style="opacity:.6">Tint</span></div>
  <div class="swatch light" style="background:#a6c8ff"><span>#a6c8ff</span><span style="opacity:.6">Fixed Dim</span></div>
  <div class="swatch light" style="background:#d5e3ff"><span>#d5e3ff</span><span style="opacity:.6">Fixed</span></div>
</div>
</body></html>
